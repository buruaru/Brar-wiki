        let wikiData = { mods: [], characters: [], songs: [] };

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function escapeAttr(str) {
            if (!str) return '';
            return str.replace(/"/g, '&quot;');
        }

        function parseText(text) {
            if (!text) return '';
            
            // 1. URL Links (Markdown style or raw URL)
            const regexUrl = /\[([^\]]+)\]\((https?:\/\/[^\s<]+?)\)|(https?:\/\/[^\s<]+)/g;
            text = text.replace(regexUrl, (match, mdText, mdUrl, rawUrl) => {
                if (mdUrl) {
                    return `<a href="${mdUrl}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline break-all">${mdText}</a>`;
                } else if (rawUrl) {
                    return `<a href="${rawUrl}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline break-all">${rawUrl}</a>`;
                }
                return match;
            });

            // 2. Internal Wiki Links (:Item Name:)
            const regexInternal = /:([^:]+):/g;
            text = text.replace(regexInternal, (match, itemName) => {
                let foundItem = null;
                let foundCategory = '';
                for (const category of ['mods', 'characters', 'songs']) {
                    const item = wikiData[category].find(i => i.name === itemName);
                    if (item) {
                        foundItem = item;
                        foundCategory = category;
                        break;
                    }
                }
                if (foundItem) {
                    return `<a href="#" onclick="openDetail('${foundCategory}', '${foundItem.id}'); return false;" class="text-blue-600 hover:underline font-bold">${itemName}</a>`;
                }
                return match; // If item is not found, keep the original text
            });

            // 3. Text Decorations
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); // Bold
            text = text.replace(/--(.+?)--/g, '<del>$1</del>'); // Strikethrough (Diagonal line / crossed out)
            text = text.replace(/~~(.+?)~~/g, '<em>$1</em>'); // Italic

            return text;
        }

        function initLocalData() {
            const storedData = localStorage.getItem('brarWikiData');
            if (storedData) {
                wikiData = JSON.parse(storedData);
                ['mods', 'characters', 'songs'].forEach(category => {
                    if (!wikiData[category]) wikiData[category] = [];
                });
            } else {
                wikiData = JSON.parse(JSON.stringify(initialWikiData));
            }

            renderList('mods', wikiData.mods);
            renderList('characters', wikiData.characters);
            renderList('songs', wikiData.songs);
        }

        const pressedKeys = new Set();
        window.addEventListener('keydown', (e) => {
            pressedKeys.add(e.code);
            if ((pressedKeys.has('ShiftLeft') || pressedKeys.has('ShiftRight')) &&
                pressedKeys.has('KeyI') &&
                pressedKeys.has('KeyO') &&
                pressedKeys.has('KeyP')) {
                
                document.body.classList.toggle('dev-mode');
                const isDev = document.body.classList.contains('dev-mode');
                localStorage.setItem('brarWikiDevMode', isDev ? 'true' : 'false');
                showNotification(isDev ? "Edit Mode: ON" : "Edit Mode: OFF");
                
                pressedKeys.clear();
            }
        });
        window.addEventListener('keyup', (e) => {
            pressedKeys.delete(e.code);
        });
        window.addEventListener('blur', () => {
            pressedKeys.clear();
        });

        if (localStorage.getItem('brarWikiDevMode') === 'true') {
            document.body.classList.add('dev-mode');
        }

        function saveToLocalStorage() {
            localStorage.setItem('brarWikiData', JSON.stringify(wikiData));
        }

        initLocalData();

        function renderList(categoryId, items) {
            const container = document.getElementById(`list-${categoryId}`);
            if (!container) return;

            const fallbackImg = "https://cdn.discordapp.com/attachments/988083080889778236/1503787825169039370/1311_20260513005546.png?ex=6a049f0c&is=6a034d8c&hm=7ab50dcf083ca74b3e8dad17697d57e19461b9ea9c0e3b7850a3daac58c25888&";

            let html = '';
            items.forEach(item => {
                const posX = item.imgPosX !== undefined ? item.imgPosX : 50;
                const posY = item.imgPosY !== undefined ? item.imgPosY : 50;

                const imageHtml = item.img 
                    ? `<img src="${escapeAttr(item.img)}" alt="${escapeAttr(item.name)}" class="w-full h-auto aspect-square object-cover mb-2 border border-gray-200 bg-gray-100" style="object-position: ${posX}% ${posY}%;">`
                    : `<img src="${fallbackImg}" alt="Placeholder" class="w-full h-auto aspect-square object-cover mb-2 border border-gray-200 bg-gray-100" style="object-position: 50% 50%;">`;

                html += `
                    <div class="item-card p-2" onclick="openDetail('${categoryId}', '${item.id}')">
                        ${imageHtml}
                        <div class="text-sm font-bold text-blue-600 text-center truncate">${escapeHTML(item.name)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function navigateTo(viewId) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(`view-${viewId}`).classList.add('active');
            window.scrollTo(0, 0);
        }

        function switchGalleryTab(btn, tabName) {
            const container = btn.closest('#detail-left-pane');
            
            container.querySelectorAll('.gallery-tab-btn').forEach(b => {
                b.classList.remove('bg-blue-50', 'border-blue-500', 'text-blue-700');
                b.classList.add('bg-gray-50', 'border-transparent', 'text-gray-500');
            });
            btn.classList.remove('bg-gray-50', 'border-transparent', 'text-gray-500');
            btn.classList.add('bg-blue-50', 'border-blue-500', 'text-blue-700');

            container.querySelectorAll('.gallery-tab-content').forEach(content => {
                if (content.getAttribute('data-tab') === tabName) {
                    content.classList.remove('hidden');
                } else {
                    content.classList.add('hidden');
                }
            });
        }

        function openDetail(category, itemId) {
            const item = wikiData[category].find(i => i.id === itemId);
            if (!item) return;

            currentCategory = category;
            currentItemId = itemId;

            const categoryName = category.charAt(0).toUpperCase() + category.slice(1);
            document.getElementById('detail-category').textContent = categoryName;
            document.getElementById('detail-breadcrumb-name').textContent = item.name;
            document.getElementById('detail-title').textContent = item.name;
            document.getElementById('detail-box-title').textContent = item.name;

            const imgElement = document.getElementById('detail-image');
            const placeholderElement = document.getElementById('detail-img-placeholder');
            const fallbackImg = "https://cdn.discordapp.com/attachments/988083080889778236/1503787825169039370/1311_20260513005546.png?ex=6a049f0c&is=6a034d8c&hm=7ab50dcf083ca74b3e8dad17697d57e19461b9ea9c0e3b7850a3daac58c25888&";

            if (item.img) {
                const posX = item.imgPosX !== undefined ? item.imgPosX : 50;
                const posY = item.imgPosY !== undefined ? item.imgPosY : 50;
                imgElement.style.objectPosition = `${posX}% ${posY}%`;
                imgElement.src = item.img;
            } else {
                imgElement.style.objectPosition = '50% 50%';
                imgElement.src = fallbackImg;
            }
            imgElement.classList.remove('hidden');
            if(placeholderElement) placeholderElement.classList.add('hidden');

            let leftHtml = `<h3 class="text-lg font-bold border-b border-gray-200 mb-2 pb-1">Overview</h3>`;
            leftHtml += `<p class="mb-6 whitespace-pre-wrap">${parseText(escapeHTML(item.desc || ''))}</p>`;

            if (category === 'characters' || category === 'songs') {
                if (item.gallery && item.gallery.length > 0) {
                    leftHtml += `<h3 class="text-lg font-bold border-b border-gray-200 mt-6 mb-4 pb-1">Gallery</h3>`;
                    
                    const tabs = [...new Set(item.gallery.map(g => g.tab || 'Main'))];
                    
                    if (tabs.length > 1) {
                        leftHtml += `<div class="flex border-b border-gray-300 mb-4 gap-2 overflow-x-auto">`;
                        tabs.forEach((tab, index) => {
                            const activeClass = index === 0 ? 'bg-blue-50 border-blue-500 text-blue-700' : 'bg-gray-50 border-transparent text-gray-500 hover:bg-gray-100';
                            leftHtml += `<button onclick="switchGalleryTab(this, '${escapeAttr(tab)}')" class="gallery-tab-btn px-4 py-2 border-b-2 font-bold text-sm whitespace-nowrap ${activeClass}">${escapeHTML(tab)}</button>`;
                        });
                        leftHtml += `</div>`;
                    }

                    leftHtml += `<div class="gallery-content-container relative min-h-[100px]">`;
                    tabs.forEach((tab, index) => {
                        const hiddenClass = index === 0 ? '' : 'hidden';
                        leftHtml += `<div class="gallery-tab-content grid grid-cols-2 md:grid-cols-3 gap-4 mb-6 ${hiddenClass}" data-tab="${escapeAttr(tab)}">`;
                        
                        item.gallery.filter(g => (g.tab || 'Main') === tab).forEach(g => {
                            const fallbackImg = "https://cdn.discordapp.com/attachments/988083080889778236/1503787825169039370/1311_20260513005546.png?ex=6a049f0c&is=6a034d8c&hm=7ab50dcf083ca74b3e8dad17697d57e19461b9ea9c0e3b7850a3daac58c25888&";
                            const imgTag = g.url ? `<img src="${escapeAttr(g.url)}" alt="${escapeAttr(g.title)}" class="w-full h-auto aspect-square object-cover bg-white border border-gray-200 mb-2">` : `<img src="${fallbackImg}" alt="Placeholder" class="w-full h-auto aspect-square object-cover bg-white border border-gray-200 mb-2">`;
                            leftHtml += `
                            <div class="border border-gray-300 bg-gray-50 p-2 text-center">
                                ${imgTag}
                                <div class="text-sm font-bold truncate">${escapeHTML(g.title)}</div>
                            </div>`;
                        });
                        
                        leftHtml += `</div>`;
                    });
                    leftHtml += `</div>`;
                }
            }

            if (category === 'mods' || category === 'characters') {
                if (item.links && item.links.trim() !== '') {
                    leftHtml += `<h3 class="text-lg font-bold border-b border-gray-200 mt-6 mb-2 pb-1">Links</h3>`;
                    leftHtml += `<p class="mb-6 whitespace-pre-wrap">${parseText(escapeHTML(item.links))}</p>`;
                }
            }
            document.getElementById('detail-left-pane').innerHTML = leftHtml;

            let rightHtml = '';
            if (category === 'mods') {
                rightHtml += `<tr><th>Release Date</th><td>${parseText(escapeHTML(item.releaseDate || ''))}</td></tr>`;
                rightHtml += `<tr><th>Director</th><td>${parseText(escapeHTML(item.director || ''))}</td></tr>`;
            } else if (category === 'characters') {
                let relatedLinks = (item.relatedChars || []).map(rObj => {
                    let rLabel = typeof rObj === 'string' ? '' : rObj.label;
                    let labelHtml = rLabel ? ` <span class="text-xs text-gray-500 font-normal">(${parseText(escapeHTML(rLabel))})</span>` : '';
                    
                    if (rObj.isCustom) {
                        return `<div class="inline-block mr-3 mb-1"><span class="text-black">${parseText(escapeHTML(rObj.name))}</span>${labelHtml}</div>`;
                    }

                    let rId = typeof rObj === 'string' ? rObj : rObj.id;
                    const rChar = wikiData.characters.find(c => c.id === rId);
                    if (!rChar) return '';
                    
                    return `<div class="inline-block mr-3 mb-1"><a href="#" onclick="openDetail('characters', '${rId}'); return false;" class="text-blue-600 hover:underline">${escapeHTML(rChar.name)}</a>${labelHtml}</div>`;
                }).filter(Boolean).join('');
                
                rightHtml += `<tr><th>Role</th><td>${parseText(escapeHTML(item.role || ''))}</td></tr>`;
                rightHtml += `<tr><th>Related Characters</th><td class="align-top">${relatedLinks}</td></tr>`;
                rightHtml += `<tr><th>Gender</th><td>${parseText(escapeHTML(item.gender || ''))}</td></tr>`;
                rightHtml += `<tr><th>Sexuality</th><td>${parseText(escapeHTML(item.sexuality || ''))}</td></tr>`;
                rightHtml += `<tr><th>Age</th><td>${parseText(escapeHTML(item.age || ''))}</td></tr>`;
                rightHtml += `<tr><th>Nationality</th><td>${parseText(escapeHTML(item.nationality || ''))}</td></tr>`;
                rightHtml += `<tr><th>Owner</th><td>${parseText(escapeHTML(item.owner || ''))}</td></tr>`;
            } else if (category === 'songs') {
                rightHtml += `<tr><th>Composer</th><td>${parseText(escapeHTML(item.composer || ''))}</td></tr>`;
            }
            document.getElementById('detail-right-pane').innerHTML = rightHtml;

            navigateTo('detail');
        }

        function openCreate(category) {
            currentCategory = category;
            currentItemId = null; // null indicates new item creation

            document.getElementById('edit-page-title').textContent = 'Create New ' + category.charAt(0).toUpperCase() + category.slice(1);
            document.getElementById('delete-btn-group').classList.add('hidden');
            document.getElementById('delete-confirm-group').classList.add('hidden');

            document.getElementById('edit-name').value = '';
            document.getElementById('edit-img').value = '';
            document.getElementById('edit-img-x').value = 50;
            document.getElementById('edit-img-y').value = 50;
            document.getElementById('edit-desc').value = '';

            renderDynamicEditFields({}); // Empty object for new item
            navigateTo('edit');
        }

        function openEdit() {
            const item = wikiData[currentCategory].find(i => i.id === currentItemId);
            if (!item) return;

            document.getElementById('edit-page-title').textContent = 'Edit Page';
            document.getElementById('delete-btn-group').classList.remove('hidden');
            document.getElementById('delete-confirm-group').classList.add('hidden');

            document.getElementById('edit-name').value = item.name || '';
            document.getElementById('edit-img').value = item.img || '';
            document.getElementById('edit-img-x').value = item.imgPosX !== undefined ? item.imgPosX : 50;
            document.getElementById('edit-img-y').value = item.imgPosY !== undefined ? item.imgPosY : 50;
            document.getElementById('edit-desc').value = item.desc || '';

            renderDynamicEditFields(item);
            navigateTo('edit');
        }

        function renderRelatedCharsCheckboxes(selectedData) {
            const container = document.getElementById('edit-related-chars-container');
            if (!container) return;
            
            const normalizedData = selectedData.map(item => typeof item === 'string' ? {id: item, label: ''} : item);
            
            let html = '<div class="space-y-1 border border-gray-300 p-2 bg-white max-h-48 overflow-y-auto">';
            wikiData.characters.forEach(char => {
                if (char.id === currentItemId) return;
                
                const selectedItem = normalizedData.find(d => d.id === char.id && !d.isCustom);
                const checked = selectedItem ? 'checked' : '';
                const labelValue = selectedItem ? escapeAttr(selectedItem.label) : '';
                
                html += `
                    <div class="flex items-center gap-2 text-sm hover:bg-gray-50 p-1">
                        <label class="flex items-center gap-2 cursor-pointer w-5/12">
                            <input type="checkbox" class="related-char-cb" value="${char.id}" ${checked} onchange="toggleRelatedLabel(this, '${char.id}')">
                            <span class="truncate font-bold">${escapeHTML(char.name)}</span>
                        </label>
                        <input type="text" id="related-label-${char.id}" class="related-char-label flex-1 border border-gray-300 px-2 py-1 text-xs outline-none focus:border-blue-500 bg-white disabled:bg-gray-100 disabled:text-gray-400" placeholder="Role/Relation (e.g. Brother)" value="${labelValue}" ${checked ? '' : 'disabled'}>
                    </div>
                `;
            });
            html += '</div>';

            html += `
                <div class="mt-2 border border-gray-300 bg-gray-50 p-2">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs font-bold text-gray-600">Unregistered Characters</span>
                        <button type="button" onclick="addCustomRelatedRow()" class="text-xs bg-gray-200 px-2 py-1 border border-gray-300 cursor-pointer font-bold hover:bg-gray-300 text-black">Add</button>
                    </div>
                    <div id="custom-related-container" class="space-y-1">`;
            
            normalizedData.forEach(item => {
                if (item.isCustom) {
                    html += getCustomRelatedCharRow(item.name, item.label);
                }
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        function getCustomRelatedCharRow(name = '', label = '') {
            return `
                <div class="flex items-center gap-2 custom-related-row">
                    <input type="text" class="cr-name w-5/12 border border-gray-300 px-2 py-1 text-xs outline-none focus:border-blue-500 bg-white text-black" placeholder="Name" value="${escapeAttr(name)}">
                    <input type="text" class="cr-label flex-1 border border-gray-300 px-2 py-1 text-xs outline-none focus:border-blue-500 bg-white text-black" placeholder="Role/Relation (e.g. Brother)" value="${escapeAttr(label)}">
                    <button type="button" onclick="this.closest('.custom-related-row').remove()" class="bg-red-50 text-red-600 px-2 py-1 border border-red-200 cursor-pointer text-xs font-bold hover:bg-red-100 flex-shrink-0">X</button>
                </div>
            `;
        }

        function addCustomRelatedRow() {
            const container = document.getElementById('custom-related-container');
            if (container) {
                container.insertAdjacentHTML('beforeend', getCustomRelatedCharRow());
            }
        }

        function toggleRelatedLabel(cb, charId) {
            const input = document.getElementById(`related-label-${charId}`);
            if (input) {
                input.disabled = !cb.checked;
                if (!cb.checked) input.value = '';
            }
        }

        function renderGalleryEdit(galleryArray) {
            const container = document.getElementById('edit-gallery-list');
            if (!container) return;
            container.innerHTML = '';
            galleryArray.forEach(g => {
                addGalleryRow(g.tab || 'Main', g.title, g.url);
            });
        }

        function addGalleryRow(tab = 'Main', title = '', url = '') {
            const container = document.getElementById('edit-gallery-list');
            if (!container) return;
            const div = document.createElement('div');
            div.className = 'flex flex-col md:flex-row gap-2 items-start md:items-center gallery-row border border-gray-200 p-2 bg-white';
            div.innerHTML = `
                <div class="flex gap-2 w-full md:w-5/12">
                    <input type="text" class="g-tab w-1/2 border border-gray-300 p-2 bg-white outline-none focus:border-blue-500 text-sm" placeholder="Tab Name (e.g. Idle)" value="${escapeAttr(tab)}">
                    <input type="text" class="g-title w-1/2 border border-gray-300 p-2 bg-white outline-none focus:border-blue-500 text-sm" placeholder="Image Title" value="${escapeAttr(title)}">
                </div>
                <div class="flex gap-2 w-full md:w-7/12">
                    <input type="text" class="g-url flex-1 border border-gray-300 p-2 bg-white outline-none focus:border-blue-500 text-sm" placeholder="Image URL" value="${escapeAttr(url)}">
                    <button type="button" onclick="this.closest('.gallery-row').remove()" class="bg-red-50 text-red-600 px-3 py-2 border border-red-200 cursor-pointer text-sm font-bold hover:bg-red-100 flex-shrink-0">Delete</button>
                </div>
            `;
            container.appendChild(div);
        }

        function saveEdit() {
            let isNew = false;
            let newItem = {};

            if (currentItemId === null) {
                isNew = true;
                currentItemId = 'item_' + Date.now();
                newItem.id = currentItemId;
            } else {
                newItem.id = currentItemId;
                const itemIndex = wikiData[currentCategory].findIndex(i => i.id === currentItemId);
                if (itemIndex === -1) return;
            }
            
            newItem.name = document.getElementById('edit-name').value;
            newItem.img = document.getElementById('edit-img').value;
            newItem.imgPosX = parseInt(document.getElementById('edit-img-x').value, 10) || 50;
            newItem.imgPosY = parseInt(document.getElementById('edit-img-y').value, 10) || 50;
            newItem.desc = document.getElementById('edit-desc').value;

            let gallery = [];
            if (currentCategory === 'characters' || currentCategory === 'songs') {
                document.querySelectorAll('.gallery-row').forEach(row => {
                    const tab = row.querySelector('.g-tab').value.trim() || 'Main';
                    const title = row.querySelector('.g-title').value.trim();
                    const url = row.querySelector('.g-url').value.trim();
                    if (title || url) {
                        gallery.push({ tab, title, url });
                    }
                });
            }

            if (currentCategory === 'mods') {
                newItem.releaseDate = document.getElementById('edit-releaseDate').value;
                newItem.director = document.getElementById('edit-director').value;
                newItem.links = document.getElementById('edit-links').value;
            } else if (currentCategory === 'characters') {
                let relatedChars = [];
                document.querySelectorAll('.related-char-cb:checked').forEach(cb => {
                    const labelInput = document.getElementById(`related-label-${cb.value}`);
                    relatedChars.push({
                        id: cb.value,
                        label: labelInput ? labelInput.value.trim() : ''
                    });
                });
                document.querySelectorAll('.custom-related-row').forEach(row => {
                    const name = row.querySelector('.cr-name').value.trim();
                    const label = row.querySelector('.cr-label').value.trim();
                    if (name) {
                        relatedChars.push({
                            isCustom: true,
                            name: name,
                            label: label
                        });
                    }
                });
                newItem.role = document.getElementById('edit-role').value;
                newItem.gender = document.getElementById('edit-gender').value;
                newItem.sexuality = document.getElementById('edit-sexuality').value;
                newItem.age = document.getElementById('edit-age').value;
                newItem.nationality = document.getElementById('edit-nationality').value;
                newItem.owner = document.getElementById('edit-owner').value;
                newItem.links = document.getElementById('edit-links').value;
                newItem.relatedChars = relatedChars;
                newItem.gallery = gallery;
            } else if (currentCategory === 'songs') {
                newItem.composer = document.getElementById('edit-composer').value;
                newItem.gallery = gallery;
            }

            if (isNew) {
                wikiData[currentCategory].push(newItem);
            } else {
                const itemIndex = wikiData[currentCategory].findIndex(i => i.id === currentItemId);
                if (itemIndex > -1) {
                    wikiData[currentCategory][itemIndex] = newItem;
                }
            }

            saveToLocalStorage();
            renderList(currentCategory, wikiData[currentCategory]);
            openDetail(currentCategory, currentItemId);
        }

        function cancelEdit() {
            if (currentItemId === null) {
                navigateTo('home');
            } else {
                openDetail(currentCategory, currentItemId);
            }
        }

        function showDeleteConfirm() {
            document.getElementById('delete-btn-group').classList.add('hidden');
            document.getElementById('delete-confirm-group').classList.remove('hidden');
        }

        function cancelDelete() {
            document.getElementById('delete-btn-group').classList.remove('hidden');
            document.getElementById('delete-confirm-group').classList.add('hidden');
        }

        function confirmDelete() {
            const itemIndex = wikiData[currentCategory].findIndex(i => i.id === currentItemId);
            if (itemIndex > -1) {
                wikiData[currentCategory].splice(itemIndex, 1);
                saveToLocalStorage();
                renderList(currentCategory, wikiData[currentCategory]);
                navigateTo('home');
            }
        }

        function copyHTML() {
            const cloneDoc = document.cloneNode(true);

            ['mods', 'characters', 'songs'].forEach(id => {
                const el = cloneDoc.getElementById(`list-${id}`);
                if(el) el.innerHTML = '';
            });

            cloneDoc.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            cloneDoc.getElementById('view-home').classList.add('active');
            
            const leftPane = cloneDoc.getElementById('detail-left-pane');
            if(leftPane) leftPane.innerHTML = '';
            const rightPane = cloneDoc.getElementById('detail-right-pane');
            if(rightPane) rightPane.innerHTML = '';
            const dynamicFields = cloneDoc.getElementById('edit-dynamic-fields');
            if(dynamicFields) dynamicFields.innerHTML = '';

            const scripts = cloneDoc.getElementsByTagName('script');
            for (let i = scripts.length - 1; i >= 0; i--) {
                const script = scripts[i];
                if (!script.src && script.type !== 'module') {
                    script.parentNode.removeChild(script);
                }
            }

            const styles = cloneDoc.getElementsByTagName('style');
            for (let i = styles.length - 1; i >= 0; i--) {
                const style = styles[i];
                if (style.textContent.includes('--tw-')) {
                    style.parentNode.removeChild(style);
                }
            }

            const remainingScripts = cloneDoc.getElementsByTagName('script');
            for (let script of remainingScripts) {
                if (script.textContent.includes('const initialWikiData =')) {
                    script.textContent = script.textContent.replace(
                        /const initialWikiData = \{[\s\S]*?\};\n(?=\s*let wikiData)/,
                        `const initialWikiData = ${JSON.stringify(wikiData, null, 12)};\n`
                    );
                    break;
                }
            }

            const htmlString = "<!DOCTYPE html>\n" + cloneDoc.documentElement.outerHTML;

            const textArea = document.createElement("textarea");
            textArea.value = htmlString;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showNotification("HTML copied to clipboard. You can now paste it into your file.");
            } catch (err) {
                showNotification("Failed to copy HTML.");
            }
            document.body.removeChild(textArea);
        }

        function showNotification(msg) {
            const toast = document.createElement('div');
            toast.textContent = msg;
            toast.className = 'fixed bottom-5 right-5 bg-green-600 text-white px-5 py-3 rounded shadow-lg z-50 font-bold';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.remove();
            }, 4000);
        }

        window.navigateTo = navigateTo;
        window.switchGalleryTab = switchGalleryTab;
        window.openDetail = openDetail;
        window.openCreate = openCreate;
        window.openEdit = openEdit;
        window.saveEdit = saveEdit;
        window.cancelEdit = cancelEdit;
        window.showDeleteConfirm = showDeleteConfirm;
        window.cancelDelete = cancelDelete;
        window.confirmDelete = confirmDelete;
        window.copyHTML = copyHTML;
        window.addGalleryRow = addGalleryRow;
        window.toggleRelatedLabel = toggleRelatedLabel;
        window.addCustomRelatedRow = addCustomRelatedRow;
    </script>
</body></html>
